version: 2
updates:
  # npm dependencies (Style Dictionary, Storybook, etc.)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions — keeps `uses:` current (incl. SHA-pinned third-party actions)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels: ["ci"]
    commit-message:
      prefix: "chore(ci)"
