name: build-tokens

# CI: rebuild the generated outputs whenever the token sources change (push),
# and GATE pull requests with the same lint + contrast checks that run locally,
# so a token regression can't merge.
#
# Production CI for parent-mf (Bitbucket) is a SEPARATE concern — not here.

on:
  push:
    paths:
      - 'tokens/**'
      - 'assets/**'
      - 'scripts/**'
      - 'style-dictionary.config.mjs'
      - 'build-tokens.mjs'
      - 'package.json'
  pull_request:
    branches: [develop, main]
  workflow_dispatch: {}

concurrency:
  group: build-tokens-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (tokens + grid + assets)
        run: npm run build

      - name: Upload generated outputs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nk-tokens-build
          path: build/
          if-no-files-found: error

  # --- Optional: commit build/ back to the repo instead of (or as well as)
  # --- uploading an artifact. Disabled by default — flip `if` to enable, and
  # --- remove `build/` from .gitignore so the outputs are tracked.
  commit-back:
    if: false
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:tokens
      - name: Commit generated outputs
        run: |
          git config user.name  "tokens-bot"
          git config user.email "tokens-bot@users.noreply.github.com"
          git add -f build/
          git diff --cached --quiet || git commit -m "chore(tokens): rebuild generated outputs"
          git push
