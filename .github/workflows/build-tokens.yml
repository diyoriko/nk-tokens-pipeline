name: build-tokens

# CI: rebuild the generated outputs whenever the token sources change (push),
# and GATE pull requests with the same lint + contrast + scope + output-shape
# checks that run locally, so a token regression can't merge. The same job also
# builds Storybook, so a showcase-breaking change is red on the PR — not first
# discovered by the post-merge Pages/preview deploys.
#
# Production CI for parent-mf (Bitbucket) is a SEPARATE concern — not here.

on:
  push:
    branches: [develop, main]
    paths:
      - 'tokens/**'
      - 'assets/**'
      - 'scripts/**'
      - 'capsules/**'
      - 'stories/**'
      - 'tests/**'
      - '.storybook/**'
      - 'style-dictionary.config.mjs'
      - 'build-tokens.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  pull_request:
    branches: [develop, main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: build-tokens-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (tokens + grid + assets — all gates)
        run: npm run build

      - name: Gate regression tests (prove the gates fail closed)
        run: npm test

      - name: Assert the gate tests left the tree pristine
        run: git diff --exit-code || (echo "::error::a gate test did not restore a mutated file" && exit 1)

      - name: Pack + install smoke (consumer's-eye export contract)
        run: npm run test:pack

      - name: Build Storybook (gate the showcase too)
        run: npx storybook build

      - name: Upload generated outputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nk-tokens-build
          path: build/
          if-no-files-found: error
