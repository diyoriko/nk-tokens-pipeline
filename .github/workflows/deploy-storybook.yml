name: deploy-storybook

# Builds the token-catalogue Storybook and publishes it to GitHub Pages.
# Pages source must be set to "GitHub Actions" (done once, via the API).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least privilege: only the deploy job needs the Pages/OIDC grants.
permissions:
  contents: read

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build-storybook # runs build:tokens first, then storybook build
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
