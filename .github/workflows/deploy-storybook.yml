name: deploy-storybook

# Builds the token-catalogue Storybook and publishes it to GitHub Pages
# (https://diyoriko.github.io/nk-tokens-pipeline/) — the single public showcase.
# Pages source must be set to "GitHub Actions" (done once, via the API).
#
# Deploys from `develop` (the integration branch), so the public Storybook
# always reflects the latest merged token work without a promote-to-main step.
# `main` moves only for package releases (a v* tag → publish-tokens.yml); it no
# longer needs to redeploy Pages. (Cloudflare Pages preview was removed
# 2026-07-20 — redundant for a solo repo; local `npm run storybook` covers
# in-progress previews.)

on:
  push:
    branches: [develop]
  workflow_dispatch: {}

# Least privilege: only the deploy job needs the Pages/OIDC grants.
permissions:
  contents: read

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build-storybook # runs build:tokens first, then storybook build

      # The designer guide is generated from the same tokens (scripts/build-guide.mjs) and
      # rides along in the same Pages artifact at /guide/. It lives outside build/ so it is
      # never packed into the npm tarball; here it is simply copied next to the Storybook.
      - name: Generate the designer guide
        run: npm run build:guide
      - name: Place the guide alongside the Storybook
        run: |
          mkdir -p storybook-static/guide
          cp guide-dist/index.html storybook-static/guide/index.html
          test -s storybook-static/guide/index.html

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: storybook-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
