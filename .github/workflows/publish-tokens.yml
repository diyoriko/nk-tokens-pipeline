name: publish-tokens

# Publishes the @diyoriko/nk-tokens package to GitHub Packages when a version
# tag is pushed (e.g. `git tag v2.4.0 && git push --tags`). The tag must match
# package.json "version" — a release commit bumps it first; the job fails on a
# mismatch. Consumers then `npm i @diyoriko/nk-tokens`.

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@diyoriko'
          cache: npm

      - run: npm ci

      # Full build (tokens + grid + assets) so every `exports` target is emitted
      # and the lint/contrast/scopes gates run before publish — not just build:tokens.
      - run: npm run build

      - name: Assert tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG — bump the version in a release commit before tagging."
            exit 1
          fi
          echo "OK: tag v$TAG == package.json $PKG"

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
