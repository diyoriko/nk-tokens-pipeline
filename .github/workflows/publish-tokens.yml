name: publish-tokens

# Publishes the @novakid/nk-tokens package to the Novakid Nexus npm registry
# (nexus.novakidschool.com) when a version tag is pushed (e.g. `git tag v2.5.1 &&
# git push origin v2.5.1`), then creates the matching GitHub Release with
# generated notes. The registry URL lives in package.json `publishConfig` (single
# source of truth); auth needs the `NEXUS_NPM_TOKEN` repo secret from devops.
#
# Guards (all must hold, in order):
#   1. the ref is a real v* TAG — a workflow_dispatch from a branch is a no-op
#   2. the tagged commit is an ancestor of main — a tag on a side branch can't
#      publish an unreviewed tree
#   3. the tag matches package.json "version" — a release commit bumps it first
# The full gated build runs before publish (and again inside prepack).

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0 # full history — needed for the ancestor-of-main assert

      - name: Assert tag is on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::${GITHUB_REF_NAME} points at a commit that is not on main — tag the promote merge commit on main."
            exit 1
          fi
          echo "OK: ${GITHUB_REF_NAME} is an ancestor of main"

      - name: Assert Nexus credentials configured
        env:
          NEXUS_NPM_TOKEN: ${{ secrets.NEXUS_NPM_TOKEN }}
        run: |
          if [ -z "$NEXUS_NPM_TOKEN" ]; then
            echo "::error::NEXUS_NPM_TOKEN secret is not set — get publish credentials for nexus.novakidschool.com from devops first."
            exit 1
          fi
          echo "OK: NEXUS_NPM_TOKEN is configured"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          cache: npm

      # Fail fast, before any dependency code runs: a mismatched tag needs no build.
      - name: Assert tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG — bump the version in a release commit before tagging."
            exit 1
          fi
          echo "OK: tag v$TAG == package.json $PKG"

      - run: npm ci

      # Full build (tokens + grid + assets + exports contract) so every `exports`
      # target is emitted and all gates run before publish — TOKEN-FREE: the
      # Nexus credential must never be in env while dependency code executes.
      - run: npm run build

      # Auth line is derived from publishConfig.registry so the registry URL
      # lives in exactly one place (package.json).
      - name: Configure Nexus npm auth
        run: |
          REG=$(node -p "require('./package.json').publishConfig.registry")
          echo "${REG#https:}:_authToken=\${NODE_AUTH_TOKEN}" >> ~/.npmrc

      # --ignore-scripts: publish must NOT re-run prepack (a second full build,
      # this time with NODE_AUTH_TOKEN readable by every dependency lifecycle
      # script — the exact exposure the preview workflow's comment forbids for
      # the CF token). files:["build"] packs the gated output built above.
      - run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NEXUS_NPM_TOKEN }}

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release (this job only)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Create GitHub Release with generated notes
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
