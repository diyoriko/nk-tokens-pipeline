name: publish-tokens

# Publishes the @diyoriko/nk-tokens package to GitHub Packages when a version
# tag is pushed (e.g. `git tag v2.6.0 && git push origin v2.6.0`), then creates
# the matching GitHub Release with generated notes. Auth is the built-in
# GITHUB_TOKEN — no external secret needed while the package lives on the
# personal GitHub Packages registry.
#
# NOTE: this repo is pre-wired for a future migration to the Novakid Nexus
# registry under the @novakid scope (raised by Dmitriy R., 2026-07-13). That
# move is NOT started — until it is, the package stays @diyoriko on GitHub
# Packages (this file + package.json `publishConfig`). See CLAUDE.md § Release.
#
# Guards (all must hold, in order):
#   1. the ref is a real v* TAG — a workflow_dispatch from a branch is a no-op
#   2. the tagged commit is an ancestor of main — a tag on a side branch can't
#      publish an unreviewed tree
#   3. the tag matches package.json "version" — a release commit bumps it first

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0 # full history — needed for the ancestor-of-main assert

      - name: Assert tag is on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::${GITHUB_REF_NAME} points at a commit that is not on main — tag the promote merge commit on main."
            exit 1
          fi
          echo "OK: ${GITHUB_REF_NAME} is an ancestor of main"

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: '@diyoriko'
          cache: npm

      # Fail fast, before any dependency code runs: a mismatched tag needs no build.
      - name: Assert tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG — bump the version in a release commit before tagging."
            exit 1
          fi
          echo "OK: tag v$TAG == package.json $PKG"

      - run: npm ci

      # Full build (tokens + grid + assets + exports contract) so every `exports`
      # target is emitted and all gates run before publish.
      - run: npm run build

      # --ignore-scripts: publish must NOT re-run prepack (a second full build,
      # this time with NODE_AUTH_TOKEN readable by every dependency lifecycle
      # script). files:["build"] packs the gated output built above.
      - run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release (this job only)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Create GitHub Release with generated notes
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
