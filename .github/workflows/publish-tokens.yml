name: publish-tokens

# Publishes the @diyoriko/nk-tokens package to GitHub Packages when a version
# tag is pushed (e.g. `git tag v2.5.1 && git push origin v2.5.1`), then creates
# the matching GitHub Release with generated notes.
#
# Guards (all must hold, in order):
#   1. the ref is a real v* TAG — a workflow_dispatch from a branch is a no-op
#   2. the tagged commit is an ancestor of main — a tag on a side branch can't
#      publish an unreviewed tree
#   3. the tag matches package.json "version" — a release commit bumps it first
# The full gated build runs before publish (and again inside prepack).

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — needed for the ancestor-of-main assert

      - name: Assert tag is on main
        run: |
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::${GITHUB_REF_NAME} points at a commit that is not on main — tag the promote merge commit on main."
            exit 1
          fi
          echo "OK: ${GITHUB_REF_NAME} is an ancestor of main"

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://npm.pkg.github.com
          scope: '@diyoriko'
          cache: npm

      - run: npm ci

      # Full build (tokens + grid + assets) so every `exports` target is emitted
      # and the lint/contrast/scopes/output gates run before publish — not just build:tokens.
      - run: npm run build

      - name: Assert tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG — bump the version in a release commit before tagging."
            exit 1
          fi
          echo "OK: tag v$TAG == package.json $PKG"

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release (this job only)
    steps:
      - uses: actions/checkout@v7
      - name: Create GitHub Release with generated notes
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
        env:
          GH_TOKEN: ${{ github.token }}
