name: preview-storybook

# Builds the token-catalogue Storybook from `develop` and deploys it to a
# SEPARATE Cloudflare Pages project (a staging preview). The production
# Storybook on GitHub Pages (deploy-storybook.yml, from `main`) is left
# untouched — this gives designers a fast "what did my token change look like"
# URL without shipping to prod.
#
# Activates only once the two Cloudflare secrets are set (see README / repo
# Settings > Secrets). Until then the deploy step is skipped, not failed.

on:
  push:
    branches: [develop]
    paths:
      - 'tokens/**'
      - 'assets/**'
      - 'stories/**'
      - '.storybook/**'
      - 'scripts/**'
      - 'style-dictionary.config.mjs'
      - 'build-tokens.mjs'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/preview-storybook.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: preview-storybook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    # No job-level secret env: the Cloudflare token must not be readable by
    # npm ci / build (dependency lifecycle scripts). Only the wrangler step
    # receives it, via `with:`; presence checks use the secrets context in ifs.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Deploy to Cloudflare Pages (preview)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0 (SHA-pinned: 3rd-party action with deploy creds)
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Production branch of the CF Pages project must be set to `develop`
          # so this lands on the stable URL https://nk-tokens-preview.pages.dev
          command: pages deploy storybook-static --project-name=nk-tokens-preview --branch=develop --commit-dirty=true

      - name: Warn when secrets are missing (deploy skipped)
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: |
          echo "::warning::Preview NOT deployed — Cloudflare secrets missing. Add CLOUDFLARE_API_TOKEN (+ CLOUDFLARE_ACCOUNT_ID) in repo Settings → Secrets; see README § Develop preview."
          {
            echo "## ⚠️ Preview deploy skipped"
            echo "Storybook built, but \`CLOUDFLARE_API_TOKEN\`/\`CLOUDFLARE_ACCOUNT_ID\` are not both set,"
            echo "so https://nk-tokens-preview.pages.dev was NOT updated. Setup: README § Develop preview."
          } >> "$GITHUB_STEP_SUMMARY"
