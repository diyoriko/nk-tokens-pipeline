name: preview-storybook

# Builds the token-catalogue Storybook from `develop` and deploys it to a
# SEPARATE Cloudflare Pages project (a staging preview). The production
# Storybook on GitHub Pages (deploy-storybook.yml, from `main`) is left
# untouched — this gives designers a fast "what did my token change look like"
# URL without shipping to prod.
#
# Activates only once the two Cloudflare secrets are set (see README / repo
# Settings > Secrets). Until then the deploy step is skipped, not failed.

on:
  push:
    branches: [develop]
    paths:
      - 'tokens/**'
      - 'assets/**'
      - 'stories/**'
      - '.storybook/**'
      - 'scripts/**'
      - 'style-dictionary.config.mjs'
      - 'build-tokens.mjs'
      - 'package.json'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: preview-storybook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Deploy to Cloudflare Pages (preview)
        if: ${{ env.CF_API_TOKEN != '' && env.CF_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3 (SHA-pinned: 3rd-party action with deploy creds)
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Production branch of the CF Pages project must be set to `develop`
          # so this lands on the stable URL https://nk-tokens-preview.pages.dev
          command: pages deploy storybook-static --project-name=nk-tokens-preview --branch=develop --commit-dirty=true

      - name: Note when secrets are missing
        if: ${{ env.CF_API_TOKEN == '' || env.CF_ACCOUNT_ID == '' }}
        run: echo "::notice::Cloudflare secrets not set — Storybook built but preview deploy skipped. Add CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID to activate."
